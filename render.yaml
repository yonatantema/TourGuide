# Render Blueprint — manages STAGING only.
#
# Production was attempted in this Blueprint and reverted: Render's
# Blueprint sync does not auto-claim manually-created services by name
# match. Adding prod entries here caused Render to provision NEW
# duplicate services with suffixed names instead of adopting the
# originals, while the prod services we already had kept running fine.
# We deleted those duplicates and removed prod from this file. Prod
# stays manually managed in the Render dashboard.
#
# Branch -> environment:
#   develop -> staging (managed here)
#   main    -> production (manually managed; not in this file)
#
# Sensitive secrets for staging (OPENAI_API_KEY, GOOGLE_CLIENT_ID,
# GOOGLE_CLIENT_SECRET) are marked sync: false — they live in the
# dashboard. JWT_SECRET is auto-generated by Render so staging tokens
# can never be honored on prod.

databases:
  - name: tourguide-staging-db
    plan: basic-256mb

services:
  - type: web
    name: tourguide-staging-server
    runtime: node
    plan: starter
    branch: develop
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tourguide-staging-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://tourguide-staging-client.onrender.com/auth/callback
      - key: CLIENT_URL
        value: https://tourguide-staging-client.onrender.com
      - key: UNLIMITED_USER_DOMAINS
        value: temacreative.com

  - type: web
    name: tourguide-staging-client
    runtime: static
    branch: develop
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://tourguide-staging-server.onrender.com
